version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive
  exclusions:
    # Skip files with "// Code generated ... DO NOT EDIT." headers.
    # This ensures only hand-maintained files (those in .fernignore) are linted.
    generated: strict
